<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attack Test - {{ method|title }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        .form-container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 3rem;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            margin-bottom: 2rem;
        }

        .form-group {
            margin-bottom: 2rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: #333;
        }

        .form-control {
            width: 100%;
            padding: 1rem;
            border: 2px solid #e1e5e9;
            border-radius: 10px;
            font-size: 1rem;
            transition: all 0.3s ease;
            background: #f8f9fa;
        }

        .form-control:focus {
            outline: none;
            border-color: #667eea;
            background: white;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .form-control.error {
            border-color: #e74c3c;
            background: #fdf2f2;
        }

        .file-upload {
            position: relative;
            display: inline-block;
            width: 100%;
        }

        .file-upload input[type=file] {
            position: absolute;
            left: -9999px;
        }

        .file-upload-label {
            display: block;
            padding: 2rem;
            border: 2px dashed #667eea;
            border-radius: 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #ffffff;
        }

        .file-upload-label:hover {
            border-color: #5a67d8;
            background: #ffffff;
        }

        .file-upload-label.has-file {
            border-color: #4ecdc4;
            background: #ffffff;
        }

        .file-upload-label.error {
            border-color: #e74c3c;
            background: #ffffff;
        }

        .file-upload-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
            color: #667eea;
        }

        .error-message {
            color: #e74c3c;
            font-size: 0.9rem;
            margin-top: 0.5rem;
            padding-left: 0.5rem;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .parameters-section {
            background: #ffffff;
            border-radius: 15px;
            padding: 2rem;
            margin-top: 2rem;
        }

        .parameters-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
        }

        .range-group {
            display: flex;
            flex-direction: column;
        }

        .range-input {
            width: 100%;
            margin: 0.5rem 0;
        }

        .range-value {
            background: #667eea;
            color: white;
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.9rem;
            align-self: flex-start;
        }

        .capacity-info {
            background: #ffffff;
            border-radius: 10px;
            padding: 1rem;
            margin-top: 1rem;
            border-left: 4px solid #4ecdc4;
        }

        .text-counter {
            font-size: 0.9rem;
            color: #666;
            text-align: right;
            margin-top: 0.5rem;
        }

        .method-info {
            background: #ffffff;
            border-radius: 15px;
            padding: 2rem;
            margin-bottom: 2rem;
            border-left: 4px solid #ffa726;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #e1e5e9;
            border-radius: 4px;
            overflow: hidden;
            margin-top: 0.5rem;
        }

        .progress-fill {
            height: 100%;
            background: #ffffff;
            border-radius: 4px;
            transition: width 0.3s ease;
        }

        /* Custom alert styles */
        .custom-alert {
            background: #ffffff;
            border: 1px solid #e74c3c;
            border-radius: 15px;
            padding: 1.5rem;
            margin-bottom: 2rem;
            display: none;
            animation: slideDown 0.3s ease-out;
        }

        .custom-alert.show {
            display: block;
        }

        .custom-alert.error {
            background: #ffffff;
            border-color: #e74c3c;
            color: #c0392b;
        }

        .custom-alert.success {
            background: #ffffff;
            border-color: #27ae60;
            color: #1e8449;
        }

        .alert-icon {
            font-size: 1.2rem;
            margin-right: 0.5rem;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 768px) {
            .form-container {
                padding: 2rem 1rem;
            }
            
            .parameters-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="/" class="logo">
                <i class="fas fa-shield-alt"></i> CapCai
            </a>
            <ul class="nav-links">
                <li><a href="/"><i class="fas fa-home"></i> Home</a></li>
                <li><a href="/compare"><i class="fas fa-balance-scale"></i> Compare</a></li>
                <li><a href="/help"><i class="fas fa-question-circle"></i> Help</a></li>
            </ul>
        </div>
    </nav>

    <div class="container" style="max-width: 800px; margin: 0 auto; padding: 2rem;">
        <h1 style="text-align: center; margin-bottom: 2rem; color: #2d3748;">⚔️ Attack Test</h1>
        
        <!-- Flash Messages -->
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ 'error' if category == 'error' else 'info' }} show" style="padding: 1rem; margin-bottom: 1rem; border-radius: 8px; background: #fee2e2; color: #991b1b; border-left: 4px solid #ef4444;">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST" enctype="multipart/form-data" class="form-container">
            <div class="form-group">
                <label>🖼️ Gambar Watermarked</label>
                <input type="file" name="watermarked_image" class="form-control" accept="image/*" required>
            </div>
            <div class="form-group">
                <label>📄 Overhead Data (.json)</label>
                <input type="file" name="overhead_data" class="form-control" accept=".json" required>
            </div>
            <div class="form-group">
                <label>💥 Jenis Serangan (Pilih minimal satu)</label>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-top: 1rem;">
                    <label><input type="checkbox" name="attack_types" value="gaussian_noise" checked> Gaussian Noise</label>
                    <label><input type="checkbox" name="attack_types" value="salt_pepper" checked> Salt & Pepper</label>
                    <label><input type="checkbox" name="attack_types" value="median_filter"> Median Filter</label>
                    <label><input type="checkbox" name="attack_types" value="gaussian_blur"> Gaussian Blur</label>
                    <label><input type="checkbox" name="attack_types" value="compression" checked> JPEG Compression</label>
                    <label><input type="checkbox" name="attack_types" value="rotation"> Rotation</label>
                    <label><input type="checkbox" name="attack_types" value="scaling"> Scaling</label>
                    <label><input type="checkbox" name="attack_types" value="cropping"> Cropping</label>
                </div>
            </div>
            <div style="text-align: center; margin-top: 2rem;">
                <button type="submit" class="btn btn-primary" style="padding: 1rem 3rem; background: #e53e3e; color: white; border: none; border-radius: 8px; cursor: pointer;">
                    🚀 Jalankan Serangan
                </button>
            </div>
        </form>
        <div style="text-align: center; margin-top: 2rem;">
            <a href="{{ url_for('index') }}" class="btn btn-secondary" style="padding: 0.5rem 1rem; background: #cbd5e0; color: #2d3748; text-decoration: none; border-radius: 8px;">🏠 Kembali</a>
        </div>
    </div>
</body>
</html>
